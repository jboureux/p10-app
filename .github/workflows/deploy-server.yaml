name: Deploy Server to VPS

on:
  push:
    branches:
      - development
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to server user credientials and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/root/projects/p10-server-${{ github.ref_name }}
            git checkout ${{ github.ref_name }}
            git pull
            make stop/prod
            docker compose -f docker/production/compose.yml --env-file server/config/environment/.env.prod.${{github.ref_name}} up -d --build
