name: Pull Request Tests

on:
  pull_request:
    branches:
      - "*"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "23"

      - name: Install dependencies
        run: |
          cd server
          corepack enable pnpm
          pnpm install

      - name: Run tests
        run: |
          cd server
          pnpm test

  check-format:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "23"

      - name: Install dependencies
        run: |
          cd server
          corepack enable pnpm
          pnpm install

      - name: Check format with Prettier
        run: |
          cd server
          pnpm check-format
