name: p10-production
services:
  server:
    build:
      dockerfile: "../docker/production/SERVER.Dockerfile"
      context: "../../server"
    env_file:
      - "../../server/.env.prod"
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - network

  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - "../../server/.env.prod"
    volumes:
      - prod-db-data:/var/lib/postgresql/data
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5434:5432"

networks:
  network:
    driver: bridge

volumes:
  prod-db-data:
